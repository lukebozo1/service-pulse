<div class="card chart-card">
    <div class="chart-header">
        <div class="card-title" style="margin-bottom:0">Score History (last 60 min)</div>
        <div style="display:flex;align-items:center;gap:16px">
            <button class="btn btn-danger btn-sm" onclick="resetScores()">Reset Scores</button>
            <div class="legend">
                <div class="legend-item">
                    <div class="legend-pip" style="background:var(--accent)"></div>
                    SSH
                </div>
                <div class="legend-item">
                    <div class="legend-pip" style="background:var(--accent2)"></div>
                    HTTP
                </div>
                <div class="legend-item">
                    <div class="legend-pip" style="background:var(--accent3)"></div>
                    FTP
                </div>
            </div>
        </div>
    </div>
    <div class="chart-wrap"><canvas id="scoreChart"></canvas></div>
</div>
